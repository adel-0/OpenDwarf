# buy-item — commerce scenario (Phase 5.4 / NORTHSTAR II.4)
#
# The agent must acquire an item from a shop without stealing.
# Success: inventory grows by at least 1 item AND no escape_hatch episode
# triggered by the shop menu (i.e. the shop trade flow was handled cleanly).
#
# Note: This is aspirational — the shop trading skill (Phase 5.4) is not yet
# implemented.  The predicate will detect if the LLM navigated the shop via
# the escape hatch vs a real skill.  Use no_event(escape_hatch, max=2) as a
# lenient pass (some unknown screen episodes are tolerated while skill is
# under development).
#
# Save capture: load an adventurer adjacent to a shop in a town, with coins
# in inventory.  See evals/README.md.

name: buy-item
description: >
  The agent acquires at least one item from a shop (inventory count increases).
  At most 2 escape_hatch episodes allowed (lenient while trade skill is open).
save: town_shop_adjacent
max_wallclock_seconds: 900
max_llm_calls: 100

success_predicate:
  all_of:
    - survived: true
    - llm_calls: 100
    # Inventory grew by at least 1 item — detected via decision_count on
    # action_count for inventory-related actions.
    # NOTE: there is no direct "inventory_gained" event in decisions.jsonl today.
    # This predicate uses action_count on eat/pickup/wear as a proxy.
    # See evals/README.md for the TODO on a real inventory_gained event.
    - action_count:
        action_prefix: pickup
        min: 1
    - no_event:
        type: escape_hatch
        max: 2
